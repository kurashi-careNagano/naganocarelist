const { useState, useEffect } = React;


// ========== FIREBASE HELPERS ==========
function useFirestore(collection) {
  const [data, setData] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const unsubscribe = db.collection(collection)
      .onSnapshot(snapshot => {
        const items = snapshot.docs.map(doc => ({ ...doc.data(), _id: doc.id }));
        setData(items);
        setLoading(false);
      }, err => {
        console.error(err);
        setLoading(false);
      });
    return () => unsubscribe();
  }, [collection]);

  return { data, loading };
}

async function saveDoc(collection, id, data) {
  try {
    await db.collection(collection).doc(String(id)).set(data, { merge: true });
  } catch(e) { console.error('Save error:', e); }
}

async function addDoc(collection, data) {
  try {
    const ref = await db.collection(collection).add(data);
    return ref.id;
  } catch(e) { console.error('Add error:', e); return null; }
}

async function updateDoc(collection, id, data) {
  try {
    await db.collection(collection).doc(String(id)).update(data);
  } catch(e) { console.error('Update error:', e); }
}

// 15分刻み切り上げ（5分超えたら次の15分へ）
function round15(min){
  if(min<=0) return 0;
  const rem=min%15;
  if(rem===0) return min;
  if(rem<=5) return min-rem; // 5分以内は切り捨て
  return min+(15-rem);       // 5分超えたら切り上げ
}

function calcFee({services=[], serviceMins={}, entryTime, exitTime, carKm, otherItems=[], clientDistanceKm}){
  if(!entryTime||!exitTime) return null;
  const [eh,em]=entryTime.split(":").map(Number), [xh,xm]=exitTime.split(":").map(Number);
  const totalMin=(xh*60+xm)-(eh*60+em);
  if(totalMin<=0) return null;
  const totalMin15=round15(totalMin); // 入退室時間を15分刻みに
  let breakdown=[],total=0;

  const hasI=services.includes("indoor"),hasE=services.includes("errands"),hasA=services.includes("aroma");
  const hasNC=services.includes("outdoor_nocar"),hasC=services.includes("outdoor_car");
  const hasCL=services.includes("cl_plan");

  // 4サービスの入力済み分数
  const indoorMinsRaw=(hasI?(parseInt(serviceMins.indoor)||0):0)+(hasE?(parseInt(serviceMins.errands)||0):0);
  const outdoorNocarMinsRaw=hasNC?(parseInt(serviceMins.outdoor_nocar)||0):0;
  const outdoorCarMinsRaw=hasC?(parseInt(serviceMins.outdoor_car)||0):0;

  // 対象サービス数
  const targetServices=[hasI||hasE, hasNC, hasC].filter(Boolean).length;
  const inputtedMins=indoorMinsRaw+outdoorNocarMinsRaw+outdoorCarMinsRaw;

  // 片方だけ入力されたとき、残りを自動計算
  const autoCalc=(inputted, others)=>{
    if(inputted>0) return round15(inputted);
    if(targetServices>1 && others>0) return Math.max(0, round15(totalMin15-others));
    return totalMin15; // 全部未入力なら入退室時間
  };

  const indoorMins15=autoCalc(indoorMinsRaw, outdoorNocarMinsRaw+outdoorCarMinsRaw);
  const outdoorNocarMins15=autoCalc(outdoorNocarMinsRaw, indoorMinsRaw+outdoorCarMinsRaw);
  const outdoorCarMins15=autoCalc(outdoorCarMinsRaw, indoorMinsRaw+outdoorNocarMinsRaw);

  // ケアリストプラン
  if(hasCL){
    const clType=serviceMins.cl_plan||"single";
    const fee=clType==="monthly"?44000:15000;
    breakdown.push({label:`✨ ケアリストプラン（${clType==="monthly"?"月4回定期":"1回"}）`,amount:fee}); total+=fee;
  }

  // 宅内・買物代行
  if(hasI||hasE){
    const m=indoorMins15;
    let fee=0;
    if(m<=30) fee=1600;
    else if(m<=60) fee=2800;
    else fee=2800+Math.ceil((m-60)/15)*700;
    const lbl=[hasI&&"宅内敷地内",hasE&&"買物等代行"].filter(Boolean).join("・");
    breakdown.push({label:`${lbl}（${m}分）`,amount:fee}); total+=fee;

    // 買物代行のガソリン代
    if(hasE){
      const errandMins=parseInt(serviceMins.errands)||0;
      const actualMins=errandMins||m;
      // 基本200円
      let gasFee=200;
      // 60分超えたら30分ごとに+100円
      if(actualMins>60){
        gasFee+=Math.ceil((actualMins-60)/30)*100;
      }
      breakdown.push({label:`⛽ 買物代行ガソリン代（${actualMins}分）`,amount:gasFee}); total+=gasFee;
    }
  }

  // アロマケア（他の支援に加算・15分ごと+1,000円）
  if(hasA){
    const mRaw=parseInt(serviceMins.aroma)||0;
    const m=round15(mRaw);
    if(m>0){
      const aromaFee=Math.ceil(m/15)*1000;
      breakdown.push({label:`🌸 アロマケア加算（${m}分 15分×1,000円）`,amount:aromaFee}); total+=aromaFee;
    } else {
      breakdown.push({label:"🌸 アロマケア加算（分数未入力）",amount:0});
    }
  }

  // 外出支援・車なし
  if(hasNC){
    const m=outdoorNocarMins15;
    const fee=m<=60?3000:3000+Math.ceil((m-60)/15)*750;
    breakdown.push({label:`外出支援・車なし（${m}分）`,amount:fee}); total+=fee;
  }

  // 外出支援・車あり
  if(hasC){
    const m=outdoorCarMins15;
    const fee=m<=60?3000:3000+Math.ceil((m-60)/15)*750;
    breakdown.push({label:`外出支援・車あり（${m}分）`,amount:fee}); total+=fee;
    const km=parseFloat(carKm)||0;
    if(km>0){const cf=Math.round(km*30);breakdown.push({label:`車同乗 ${km}km×30円`,amount:cf});total+=cf;}
    // ガソリン代 + 遠距離加算（どちらも往復計算）
    const dkm=parseFloat(clientDistanceKm)||0;
    if(dkm>0){
      const roundTrip=dkm*2; // 往復距離
      // ガソリン代（1kmあたり30円・往復）
      const gasFee=Math.round(roundTrip*30);
      breakdown.push({label:`⛽ ガソリン代（片道${dkm}km×往復×30円）`,amount:gasFee}); total+=gasFee;
      // 遠距離加算（片道15km以上・往復分）
      if(dkm>=15&&dkm<20){
        breakdown.push({label:`🚗 遠距離加算（片道${dkm}km×往復）`,amount:2000}); total+=2000;
      } else if(dkm>=20){
        const extra=Math.ceil((dkm-15)/10)*1000*2;
        breakdown.push({label:`🚗 遠距離加算（片道${dkm}km×往復）`,amount:extra}); total+=extra;
      }
    }
  }

  // でこぼこhouse
  if(services.includes("deco_house")){
    const decoMins=serviceMins.deco_house||{};
    // 余白プラン
    const yohakuPlan=DECO_YOHAKU.find(p=>decoMins[p.key]);
    if(yohakuPlan){
      breakdown.push({label:`🏡 余白プラン・${yohakuPlan.label}`,amount:yohakuPlan.price}); total+=yohakuPlan.price;
    }
    // 通常プラン
    const normalPlan=DECO_NORMAL.find(p=>decoMins[p.key]);
    if(normalPlan){
      breakdown.push({label:`🏡 通常プラン・${normalPlan.label}`,amount:normalPlan.price}); total+=normalPlan.price;
      // 延長
      const ext=parseInt(decoMins.extension)||0;
      if(ext>0){
        const extFee=ext*2200;
        breakdown.push({label:`🏡 延長 ${ext}時間`,amount:extFee}); total+=extFee;
      }
    }
    // 食事代
    if(decoMins.meal){
      breakdown.push({label:"🍽 食事代",amount:700}); total+=700;
    }
  }

  // 家族加算（外出支援）
  if((services.includes("outdoor_nocar")||services.includes("outdoor_car"))&&serviceMins.family_addon_type&&parseInt(serviceMins.family_addon_count||0)>0){
    const addonType=FAMILY_ADDON.find(f=>f.key===serviceMins.family_addon_type);
    const count=parseInt(serviceMins.family_addon_count)||0;
    if(addonType&&count>0){
      const addonFee=addonType.price*count;
      breakdown.push({label:`👨‍👩‍👧 家族加算（${addonType.label}×${count}名）`,amount:addonFee}); total+=addonFee;
    }
  }

  // 緊急対応加算
  if(services.includes("emergency")){
    breakdown.push({label:"🚨 緊急対応加算",amount:500}); total+=500;
  }

  // 当日キャンセル料
  if(services.includes("cancel")){
    const cancelType=serviceMins.cancel_type||"cancel_2800";
    const cancelItem=CANCEL_FEE_OPTIONS.find(c=>c.key===cancelType)||CANCEL_FEE_OPTIONS[1];
    breakdown.push({label:`❌ 当日キャンセル料（${cancelItem.label}）`,amount:cancelItem.amount});
    total+=cancelItem.amount;
  }

  // 当日キャンセル料
  if(services.includes("cancel")){
    // 宅内・買物代行・外出支援の予定料金をそのままキャンセル料に（上限2800円）
    let cancelBase=0;
    if(hasI||hasE){
      const m=indoorMins15||totalMin15;
      if(m<=30) cancelBase=1600;
      else cancelBase=2800; // 上限2800円
    }
    if(hasNC){
      cancelBase=Math.max(cancelBase,Math.min(outdoorNocarMins15<=60?3000:3000+Math.ceil((outdoorNocarMins15-60)/15)*750, 2800));
    }
    if(hasC){
      cancelBase=Math.max(cancelBase,Math.min(outdoorCarMins15<=60?3000:3000+Math.ceil((outdoorCarMins15-60)/15)*750, 2800));
    }
    // サービス未選択の場合は一律2800円
    if(cancelBase===0) cancelBase=2800;
    breakdown.push({label:"❌ 当日キャンセル料",amount:cancelBase}); total+=cancelBase;
  }

  // その他
  (otherItems||[]).forEach((item,i)=>{
    const amt=parseInt(item.fee)||0;
    if(amt>0||item.note){
      breakdown.push({label:`📌 ${item.note||"その他"+(i+1)}`,amount:amt}); total+=amt;
    }
  });

  // 時間外加算（ガソリン代・遠距離加算・その他・でこぼこhouse・ケアリストプラン以外に適用）
  if(entryTime&&exitTime){
    const [eh,em]=entryTime.split(":").map(Number);
    const [xh,xm]=exitTime.split(":").map(Number);
    const startMin=eh*60+em;
    const endMin=xh*60+xm;

    // 時間帯ごとの加算率を計算
    // 6-8時・18-20時: 20%アップ、20-翌6時: 40%アップ
    const calcOvertimeRate=(startM, endM)=>{
      // 翌日をまたぐ場合
      const end=endM<startM?endM+24*60:endM;
      let zone20=0, zone40=0, zoneNormal=0;
      for(let m=startM;m<end;m++){
        const h=(m/60|0)%24;
        if((h>=6&&h<8)||(h>=18&&h<20)) zone20++;
        else if(h>=20||h<6) zone40++;
        else zoneNormal++;
      }
      const totalMins=zone20+zone40+zoneNormal;
      if(totalMins===0) return {rate:0,label:null};
      // 加重平均で加算率を計算
      const extraRate=(zone20*0.2+zone40*0.4)/totalMins;
      if(extraRate<=0) return {rate:0,label:null};
      let label="";
      if(zone40>0&&zone20>0) label=`時間外加算（早朝/夜間帯含む）`;
      else if(zone40>0) label=`時間外加算（夜間・深夜帯 +40%）`;
      else label=`時間外加算（早朝・夕方帯 +20%）`;
      return {rate:extraRate, label, zone20, zone40};
    };

    const {rate, label, zone20, zone40}=calcOvertimeRate(startMin, endMin);
    if(rate>0&&label){
      // 加算対象：ガソリン・遠距離・その他・でこぼこ・ケアリスト以外の小計
      const baseTotal=breakdown
        .filter(b=>!b.label.includes("ガソリン")&&!b.label.includes("遠距離")&&!b.label.includes("📌")&&!b.label.includes("🏡")&&!b.label.includes("✨"))
        .reduce((s,b)=>s+b.amount,0);
      const overtimeFee=Math.round(baseTotal*rate);
      if(overtimeFee>0){
        const details=[];
        if(zone20>0) details.push(`早朝/夕方${zone20}分×20%`);
        if(zone40>0) details.push(`夜間/深夜${zone40}分×40%`);
        breakdown.push({label:`🌙 ${label}（${details.join("・")}）`,amount:overtimeFee});
        total+=overtimeFee;
      }
    }
  }

  return {breakdown,total,totalMin,totalMin15};
}

function LoginScreen({onLogin, staffList}){
  const [mode,setMode]=useState("login"); // "login" | "register"
  const [loginId,setLoginId]=useState(""), [password,setPassword]=useState(""), [err,setErr]=useState("");
  const [regName,setRegName]=useState(""), [regEmail,setRegEmail]=useState(""), [regPass,setRegPass]=useState(""), [regPass2,setRegPass2]=useState(""), [regRole,setRegRole]=useState("cl"), [regDone,setRegDone]=useState(false), [regErr,setRegErr]=useState("");

  const [checking,setChecking]=useState(false);
  const handle=async()=>{
    setChecking(true);
    setErr("");
    try {
      // Firestoreでloginまたはemailからユーザー情報取得
      let snapshot = await db.collection("staff").where("email","==",loginId).get();
      if(snapshot.empty){
        snapshot = await db.collection("staff").where("loginId","==",loginId).get();
      }
      if(snapshot.empty){ setErr("IDまたはメールアドレスが登録されていません"); setChecking(false); return; }
      const doc=snapshot.docs[0];
      const acc=doc.data();
      if(acc.status==="pending"){ setErr("承認待ちです。管理者の承認をお待ちください。"); setChecking(false); return; }

      // 家族アカウント（loginId使用）はパスワード直接照合
      const isFamilyAccount = acc.email&&acc.email.includes("@family.local");
      if(isFamilyAccount){
        if(acc.password!==password){ setErr("パスワードが違います"); setChecking(false); return; }
        const userData={...acc,_id:doc.id};
        localStorage.setItem("kurashi_care_user",JSON.stringify(userData));
        setErr(""); onLogin(userData);
        setChecking(false); return;
      }

      // スタッフ・管理者：Firebase Auth認証を試みる
      try {
        await auth.signInWithEmailAndPassword(acc.email, password);
        const userData={...acc,_id:doc.id};
        localStorage.setItem("kurashi_care_user",JSON.stringify(userData));
        setErr(""); onLogin(userData);
      } catch(authErr){
        // Firebase Authにまだ登録されていない場合は旧パスワードで照合
        if(["auth/user-not-found","auth/invalid-credential","auth/wrong-password","auth/invalid-login-credentials"].includes(authErr.code)){
          if(acc.password===password){
            // Firebase Authにユーザーを自動登録
            try{
              await auth.createUserWithEmailAndPassword(acc.email, password);
            }catch(e){ /* すでにいる場合は無視 */ }
            const userData={...acc,_id:doc.id};
            localStorage.setItem("kurashi_care_user",JSON.stringify(userData));
            setErr(""); onLogin(userData);
          } else {
            setErr("パスワードが違います");
          }
        } else {
          setErr("ログインに失敗しました。もう一度お試しください。");
          console.error(authErr);
        }
      }
    } catch(e) {
      setErr("通信エラーが発生しました。もう一度お試しください。");
      console.error(e);
    }
    setChecking(false);
  };

  const handleRegister=async()=>{
    setRegErr("");
    if(!regName||!regEmail||!regPass){setRegErr("すべての項目を入力してください");return;}
    if(regPass!==regPass2){setRegErr("パスワードが一致しません");return;}

    };
    try{
      // Firebase Authにアカウント作成

        await auth.createUserWithEmailAndPassword(regEmail, regPass);

        if(authE.code!=="auth/email-already-in-use") throw authE;
      }
      await db.collection("staff").doc(newStaff.id).set(newStaff);
      setRegDone(true);
    }catch(e){ setRegErr("登録に失敗しました。もう一度お試しください。"); console.error(e); }
  };

  if(mode==="register"){
    return(
      <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:"100%",maxWidth:360,padding:"0 18px"}}>

            <div style={{fontSize:17,fontWeight:700,color:COLORS.sageDark,letterSpacing:"0.1em"}}>でこぼこ</div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:360,padding:"0 18px"}}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div style={{fontSize:36,marginBottom:7}}>🌱</div>
          <div style={{fontSize:21,fontWeight:700,color:COLORS.sageDark}}>暮らしのケア記録</div>

// ========== SUPPORT TIMER ==========
function SupportTimer({form, set}){
  const nowStr=()=>{ const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; };
  const toMin=t=>{ if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; };
  const fmtMin=m=>{ const h=Math.floor(m/60); const min=m%60; return `${h>0?h+"時間":""}${min>0?min+"分":""}`; };

  // 一時停止ログ: [{pausedAt, resumedAt}]
  const pauses=form.pauseLog||[];
  const isPaused=form.pausedAt&&!form.resumedAt;

  // 実際の支援時間（一時停止時間を除く）
  const calcActualMins=()=>{
    if(!form.entryTime) return 0;
    const endMin=form.exitTime?toMin(form.exitTime):toMin(nowStr());
    const totalMin=endMin-toMin(form.entryTime);
    const pausedMin=pauses.reduce((sum,p)=>{
      const start=toMin(p.pausedAt);
      const end=p.resumedAt?toMin(p.resumedAt):toMin(nowStr());
      return sum+(end-start);
    },0);
    return Math.max(0,totalMin-pausedMin);
  };

  const actualMins=calcActualMins();

  // 一時停止中の経過時間表示用（リアルタイムではないが十分）
  const pausedMins=isPaused&&form.pausedAt?toMin(nowStr())-toMin(form.pausedAt):0;

  return(
    <div style={{marginBottom:12}}>
      {/* メインボタン */}
      <div style={S.row}>
        <div style={S.col}>
          <button
            onClick={()=>{ if(!form.entryTime) set("entryTime",nowStr()); }}
            style={{...S.btn(form.entryTime?"outline":"primary"),width:"100%",padding:"12px",fontSize:14,fontWeight:700}}
            disabled={!!form.entryTime}
          >
            {form.entryTime?`✅ 支援開始 ${form.entryTime}`:"🟢 支援開始"}
          </button>
        </div>
        <div style={S.col}>
          <button
            onClick={()=>{ if(!form.exitTime) set("exitTime",nowStr()); }}
            style={{...S.btn(form.exitTime?"outline":"danger"),width:"100%",padding:"12px",fontSize:14,fontWeight:700}}
            disabled={!form.entryTime||isPaused}
          >
            {form.exitTime?`✅ 支援終了 ${form.exitTime}`:"🔴 支援終了"}
          </button>
        </div>
      </div>

      {/* 一時停止・再開ボタン（支援開始後・支援終了前のみ） */}
      {form.entryTime&&!form.exitTime&&(
        <div style={{marginTop:6}}>
          {!isPaused?(
            <button
              onClick={()=>{
                const t=nowStr();
                set("pausedAt",t);
                set("pauseLog",[...pauses,{pausedAt:t,resumedAt:null}]);
              }}
              style={{...S.btn("outline"),width:"100%",padding:"10px",fontSize:13,fontWeight:700,borderColor:COLORS.gold,color:COLORS.gold}}
            >
              ⏸ 一時離席（離れる）
            </button>
          ):(
            <div>
              <div style={{textAlign:"center",fontSize:12,color:COLORS.accent,marginBottom:5,fontWeight:600}}>
                ⏸ 離席中... {pausedMins>0?`（約${pausedMins}分）`:""}
              </div>
              <button
                onClick={()=>{
                  const t=nowStr();
                  const updated=pauses.map((p,i)=>i===pauses.length-1?{...p,resumedAt:t}:p);
                  set("pauseLog",updated);
                  set("pausedAt",null);
                  set("resumedAt",null);
                }}
                style={{...S.btn("primary"),width:"100%",padding:"10px",fontSize:13,fontWeight:700,background:COLORS.sageDark}}
              >
                ▶️ 支援再開
              </button>
            </div>
          )}
        </div>
      )}

      {/* 支援時間表示 */}
      {form.entryTime&&(
        <div style={{marginTop:7,padding:"8px 12px",background:COLORS.greenLight,borderRadius:8,border:`1px solid ${COLORS.green}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
            <div style={{fontSize:12,color:COLORS.green,fontWeight:700}}>
              {form.exitTime?"支援完了":"支援中"} 実支援時間：{fmtMin(actualMins)||"0分"}
            </div>
            {pauses.length>0&&(
              <div style={{fontSize:10,color:COLORS.muted}}>
                離席{pauses.length}回・計{fmtMin(pauses.reduce((s,p)=>{
                  const end=p.resumedAt?toMin(p.resumedAt):toMin(nowStr());
                  return s+(end-toMin(p.pausedAt));
                },0))}
              </div>
            )}
          </div>
          {pauses.length>0&&(
            <div style={{marginTop:4}}>
              {pauses.map((p,i)=>(
                <div key={i} style={{fontSize:10,color:COLORS.muted}}>
                  離席{i+1}: {p.pausedAt}〜{p.resumedAt||"離席中"}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* 押し忘れ用手入力 */}
      <div style={{marginTop:7,padding:"8px 10px",background:COLORS.cream,borderRadius:8}}>
        <div style={{fontSize:10,color:COLORS.muted,marginBottom:5}}>押し忘れた場合は手入力</div>
        <div style={S.row}>
          <div style={S.col}><label style={S.label}>開始時刻</label><input style={S.input} type="time" value={form.entryTime} onChange={e=>set("entryTime",e.target.value)}/></div>
          <div style={S.col}><label style={S.label}>終了時刻</label><input style={S.input} type="time" value={form.exitTime} onChange={e=>set("exitTime",e.target.value)}/></div>
        </div>
      </div>
    </div>
  );
}

function RecordForm({client,currentUser,staffList=[],onSave,initialData,isEditing}){
  const empty={
    date:new Date().toISOString().slice(0,10),
    staff:currentUser?.name||"",
    entryTime:"",exitTime:"",pauseLog:[],pausedAt:null,resumedAt:null,
    condition:"良好",
    services:[],
    serviceMins:{},
    carKm:"",
    distanceKm:"",
    otherItems:[{note:"",fee:""}],
    memo:"",familyShare:false,
    paymentMethod:client?.paymentMethod||"",
    photos:[]
  };

  // ページ更新後も支援中の状態を維持
  const storageKey=`kurashi_care_form_${client?.id}`;
  const [form,setForm]=useState(()=>{
    // 編集モードの場合はinitialDataを使用
    if(isEditing&&initialData) return {
      // デフォルト値で補完してから既存データを上書き
      date:new Date().toISOString().slice(0,10),
      staff:currentUser?.name||"",
      entryTime:"", exitTime:"",
      condition:"良好",
      services:[],
      serviceMins:{},
      carKm:"",
      distanceKm:"",
      otherItems:[{note:"",fee:""}],
      memo:"", familyShare:false,
      paymentMethod:client?.paymentMethod||"",
      photos:[],
      // 既存データで上書き
      ...initialData,
      photos:initialData.photos||[],
      services:initialData.services||[],
      serviceMins:initialData.serviceMins||{},
      otherItems:initialData.otherItems||[{note:"",fee:""}],
    };
    try{
      const saved=localStorage.getItem(storageKey);
      if(saved){
        const parsed=JSON.parse(saved);
        if(parsed.date===new Date().toISOString().slice(0,10)){
          return {...parsed, photos:[]};
        }
      }
    }catch(e){}
    return empty;
  });

  const set=(k,v)=>setForm(f=>{
    const next={...f,[k]:v};
    try{
      // 写真以外を保存（容量節約）
      const toSave={...next, photos:[]};
      localStorage.setItem(storageKey, JSON.stringify(toSave));
    }catch(e){}
    return next;
  });

  const toggleSvc=key=>setForm(f=>{
    const checked=f.services.includes(key);
    const services=checked?f.services.filter(s=>s!==key):[...f.services,key];
    const serviceMins={...f.serviceMins};
    if(checked) delete serviceMins[key];
    return {...f,services,serviceMins};

// ========== PHOTO GRID ==========
function PhotoGrid({photos,compact}){
  const [enlarged,setEnlarged]=useState(null);
  if(!photos||photos.length===0) return null;
  return(
    <>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
        {photos.map((p,i)=>(
          <img key={p.id||i} src={p.dataUrl} alt="" onClick={()=>setEnlarged(p)}
            style={{width:compact?56:72,height:compact?56:72,objectFit:"cover",borderRadius:7,border:`1px solid ${COLORS.border}`,cursor:"pointer"}}/>
        ))}
      </div>
      {enlarged&&(
        <div onClick={()=>setEnlarged(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <img src={enlarged.dataUrl} alt="" style={{maxWidth:"95vw",maxHeight:"90vh",objectFit:"contain",borderRadius:10}}/>
          <button onClick={()=>setEnlarged(null)} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.2)",border:"none",color:"white",fontSize:24,borderRadius:"50%",width:36,height:36,cursor:"pointer"}}>×</button>
        </div>
      )}
    </>
  );
}

// ========== RECORD LIST ==========
function RecordList({records, currentUser, client, onUpdateRecord, onDeleteRecord, staffList=[]}){
  if(records.length===0) return <div style={{...S.card,color:COLORS.muted,textAlign:"center",fontSize:13,padding:24}}>まだ記録がありません</div>;
  const condColor={"良好":"#7A9E87","普通":"#B0A875","やや不調":"#C4885A","不調":"#C0504A","要注意":"#8B2FC9"};
  const [editingId,setEditingId]=useState(null);
  const canEdit=(r)=> currentUser?.role==="admin"||currentUser?.role==="sv"||currentUser?.name===r.staff;

  // 編集中はRecordFormを全画面表示
  if(editingId){
    const editTarget=records.find(r=>r.id===editingId);
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <button onClick={()=>setEditingId(null)} style={{...S.btn("outline"),fontSize:12,padding:"6px 14px"}}>← 一覧に戻る</button>
          <span style={{fontSize:13,fontWeight:600,color:COLORS.sageDark}}>✏️ 記録を編集</span>
        </div>
        <RecordForm
          client={client}
          currentUser={currentUser}
          staffList={staffList}
          initialData={editTarget}
          isEditing={true}
          onSave={async updated=>{
            await onUpdateRecord(updated);
            setEditingId(null);
          }}
        />

// ========== RECURRING DAY EDITOR ==========
function RecurringDayEditor({s, idx, selDateStr, currentStaff, assignStaff, setAssignStaff, staffList, onEditSchedule, onDeleteSchedule, existingOverride, onOverrideSaved}){
  const key=`${s.id}_${s.date}`;
  // overrideはその日だけの変更データ
  const [override,setOverride]=useState(existingOverride||null);
  const [editingTime,setEditingTime]=useState(false);
  const [tmpStart,setTmpStart]=useState(existingOverride?.startTime||s.startTime||"");
  const [tmpEnd,setTmpEnd]=useState(existingOverride?.endTime||s.endTime||"");
  const [tmpDate,setTmpDate]=useState(existingOverride?.movedDate||selDateStr);
  const [confirmed,setConfirmed]=useState(existingOverride?.confirmed||false);

  useEffect(()=>{
    if(existingOverride){
      setOverride(existingOverride);
      if(existingOverride.startTime) setTmpStart(existingOverride.startTime);
      if(existingOverride.endTime) setTmpEnd(existingOverride.endTime);
      if(existingOverride.movedDate) setTmpDate(existingOverride.movedDate);
      if(existingOverride.confirmed) setConfirmed(true);
    }
  },[existingOverride]);

  const displayStart=override?.startTime||s.startTime||"";
  const displayEnd=override?.endTime||s.endTime||"";
  const displayStaff=assignStaff[key]||override?.staff||s.staff||"";

  const saveOverride=async(data)=>{
    const merged={...(override||{}), ...data, date:selDateStr};
    setOverride(merged);
    onOverrideSaved&&onOverrideSaved(`${s.id}_${selDateStr}`, merged);
    try{ await db.collection("schedules").doc(String(s.id)).collection("overrides").doc(selDateStr).set(merged,{merge:true}); }
    catch(e){ console.error(e); }
  };

  return(
    <div style={{...S.listItem, background:s.isRecurringInstance?"#F0F7F3":"transparent", borderRadius:8, padding:"10px 8px", marginBottom:4}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
        <div style={{flex:1}}>
          {/* 時間表示・編集 */}
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5,flexWrap:"wrap"}}>
            {editingTime?(
              <div style={{display:"flex",flexDirection:"column",gap:6,background:COLORS.blueLight,borderRadius:8,padding:"8px 10px",marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:600,color:COLORS.blue,marginBottom:2}}>時間・日付を変更</div>
                {/* 日付変更 */}
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:COLORS.muted,whiteSpace:"nowrap"}}>日付:</span>
                  <input type="date" value={tmpDate} onChange={e=>setTmpDate(e.target.value)} style={{...S.input,fontSize:11,padding:"3px 6px",flex:1}}/>
                  {tmpDate!==selDateStr&&<span style={{fontSize:10,color:COLORS.accent}}>変更あり</span>}
                </div>
                {/* 時間変更 */}
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:11,color:COLORS.muted,whiteSpace:"nowrap"}}>時間:</span>
                  <input type="time" value={tmpStart} onChange={e=>setTmpStart(e.target.value)} style={{...S.input,width:85,fontSize:11,padding:"3px 6px"}}/>
                  <span style={{fontSize:11}}>〜</span>
                  <input type="time" value={tmpEnd} onChange={e=>setTmpEnd(e.target.value)} style={{...S.input,width:85,fontSize:11,padding:"3px 6px"}}/>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={async()=>{
                    await saveOverride({startTime:tmpStart,endTime:tmpEnd,movedDate:tmpDate!==selDateStr?tmpDate:null});
                    setEditingTime(false);
                  }} style={{...S.btn("primary"),fontSize:10,padding:"5px 14px"}}>保存</button>
                  <button onClick={()=>{ setEditingTime(false); setTmpDate(selDateStr); }} style={{...S.btn("outline"),fontSize:10,padding:"5px 10px"}}>キャンセル</button>
                </div>
              </div>
            ):(
              <>
                <span style={{fontSize:13,fontWeight:700,color:(override?.startTime||override?.movedDate)?COLORS.accent:COLORS.blue}}>
                  {override?.movedDate&&override.movedDate!==selDateStr
                    ?<span style={{fontSize:10,color:COLORS.accent,marginRight:4}}>→{override.movedDate.slice(5).replace("-","/")}に変更</span>
                    :null}
                  {displayStart}{displayEnd?`〜${displayEnd}`:""}
                  {override?.startTime&&!override?.movedDate&&<span style={{fontSize:9,color:COLORS.accent,marginLeft:3}}>時間変更済</span>}
                </span>
                <button onClick={()=>{setEditingTime(true);setTmpDate(override?.movedDate||selDateStr);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:COLORS.blue}}>✏️</button>
              </>
            )}
            <span style={{fontSize:13,fontWeight:700}}>{s.clientName}</span>
            {s.isRecurringInstance&&<span style={S.badge(confirmed?COLORS.green:COLORS.blue)}>{confirmed?"✓ 確定":"🔁 定期"}</span>}
            {!s.isRecurringInstance&&<span style={S.badge(s.confirmed?COLORS.green:COLORS.gold)}>{s.confirmed?"確定":"未確定"}</span>}
          </div>

          {s.services?.length>0&&<div style={{fontSize:11,color:COLORS.sageDark,fontWeight:600,marginBottom:5}}>{serviceLabel(s.services)}</div>}

          {/* 担当スタッフ */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
            <span style={{fontSize:11,color:COLORS.muted,whiteSpace:"nowrap"}}>担当:</span>
            <select value={displayStaff} onChange={async e=>{
              const newStaff=e.target.value;
              setAssignStaff(prev=>({...prev,[key]:newStaff}));
              if(s.isRecurringInstance){
                await saveOverride({staff:newStaff});
              } else {
                try{ await db.collection("schedules").doc(String(s.id)).update({staff:newStaff}); }catch(e){}
              }
            }} style={{...S.input,fontSize:11,padding:"4px 8px",flex:1}}>
              <option value="">未設定</option>
              {staffList.filter(st=>st.role!=="family"&&st.status!=="pending").map(st=>(
                <option key={st.id} value={st.name}>{st.name}（{getRoleLabel(st.role)}）</option>
              ))}
            </select>
          </div>

          {/* 確定ボタン（定期の場合はその日だけ確定） */}
          {!confirmed&&(
            <button onClick={async()=>{
              setConfirmed(true);
              await saveOverride({confirmed:true, staff:displayStaff, startTime:tmpStart, endTime:tmpEnd});
            }} style={{...S.btn("green"),fontSize:11,padding:"5px 14px"}}>✓ この日を確定する</button>
          )}
          {confirmed&&<div style={{fontSize:11,color:COLORS.green,fontWeight:600}}>✓ 確定済み</div>}

          {s.note&&<div style={{fontSize:11,color:COLORS.muted,marginTop:3}}>{s.note}</div>}
        </div>

        {/* 削除ボタン */}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {!s.isRecurringInstance&&(
            <button onClick={()=>onEditSchedule&&onEditSchedule(s)} style={{...S.btn("outline"),fontSize:10,padding:"4px 9px",whiteSpace:"nowrap"}}>✏️</button>
          )}
          {s.isRecurringInstance?(
            <>
              {/* この日だけキャンセル */}
              <button onClick={async()=>{
                if(!window.confirm(selDateStr+"の予定だけキャンセルしますか?")) return;
                await saveOverride({cancelled:true});
                onOverrideSaved&&onOverrideSaved(`${s.id}_${selDateStr}`,{...(override||{}),cancelled:true,date:selDateStr});
              }} style={{...S.btn("outline"),fontSize:9,padding:"4px 7px",whiteSpace:"nowrap",borderColor:COLORS.accent,color:COLORS.accent}}>
                この日だけ<br/>キャンセル
              </button>
              {/* 定期ごと削除 */}
              <button onClick={()=>{
                if(window.confirm("定期設定を完全に削除しますか?(全ての日程が消えます)")) onDeleteSchedule&&onDeleteSchedule(s.id);
              }} style={{...S.btn("danger"),fontSize:9,padding:"4px 7px",whiteSpace:"nowrap"}}>
                定期ごと<br/>削除
              </button>
            </>
          ):(
            <button onClick={()=>onDeleteSchedule&&onDeleteSchedule(s.id)}
              style={{...S.btn("danger"),fontSize:10,padding:"4px 9px",whiteSpace:"nowrap"}}>🗑</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ========== CALENDAR ==========
// 定期予定をカレンダー表示用の日付付きスケジュールに展開
function expandRecurring(schedules, year, month, overrides={}){
  const result=[];
  const daysInMonth=getDays(year,month);
  schedules.forEach(s=>{
    if(!s.recurring){
      result.push(s);
    } else {
      const targetDow=s.recurringDay!==undefined?parseInt(s.recurringDay):1;
      for(let d=1;d<=daysInMonth;d++){
        const dateStr=toDS(year,month,d);
        const dow=new Date(year,month,d).getDay();
        if(dow===targetDow){
          // このdateStrのoverride確認
          const ov=overrides[`${s.id}_${dateStr}`];
          // キャンセルされた日は非表示
          if(ov?.cancelled) continue;
          // 日付変更されていたら元の日は非表示
          if(ov?.movedDate && ov.movedDate!==dateStr) continue;
          result.push({
            ...s,
            date:dateStr,
            startTime:ov?.startTime||s.recurringTime||s.startTime,
            endTime:ov?.endTime||s.recurringEndTime||s.endTime,
            staff:ov?.staff||s.staff,
            confirmed:ov?.confirmed||false,
            isRecurringInstance:true,
            hasOverride:!!ov,
          });
        }
      }
      // 日付変更された分を追加（別日に移動した予定）
      Object.entries(overrides).forEach(([key,ov])=>{
        if(!key.startsWith(`${s.id}_`)) return;
        if(!ov.movedDate) return;
        const movedYear=parseInt(ov.movedDate.slice(0,4));
        const movedMonth=parseInt(ov.movedDate.slice(5,7))-1;
        if(movedYear===year&&movedMonth===month){
          result.push({
            ...s,
            date:ov.movedDate,
            startTime:ov.startTime||s.recurringTime||s.startTime,
            endTime:ov.endTime||s.recurringEndTime||s.endTime,
            staff:ov.staff||s.staff,
            confirmed:ov.confirmed||false,
            isRecurringInstance:true,
            hasOverride:true,
            movedFrom:key.replace(`${s.id}_`,""),
          });
        }
      });
    }
  });
  return result;
}

function CalendarView({allSchedules,onDayClick,staffList=[],onEditSchedule,onDeleteSchedule,currentUser}){
  const today=new Date();
  const [vY,setVY]=useState(today.getFullYear()),[vM,setVM]=useState(today.getMonth()),[selDay,setSelDay]=useState(null);
  const [assignStaff,setAssignStaff]=useState({});
  const [overrides,setOverrides]=useState({}); // {schedId_date: overrideData}
  const days=getDays(vY,vM),first=getFirst(vY,vM),todayStr=toDS(today.getFullYear(),today.getMonth(),today.getDate());
  const prev=()=>{if(vM===0){setVY(y=>y-1);setVM(11);}else setVM(m=>m-1);setSelDay(null);};
  const next=()=>{if(vM===11){setVY(y=>y+1);setVM(0);}else setVM(m=>m+1);setSelDay(null);};

  // 定期予定のoverridesをFirebaseから読み込む
  useEffect(()=>{
    const recurringSchedules=allSchedules.filter(s=>s.recurring);
    if(recurringSchedules.length===0) return;
    const newOverrides={};
    Promise.all(recurringSchedules.map(async s=>{
      try{
        const snap=await db.collection("schedules").doc(String(s.id)).collection("overrides").get();
        snap.docs.forEach(doc=>{
          newOverrides[`${s.id}_${doc.id}`]=doc.data();
        });
      }catch(e){}
    })).then(()=>setOverrides(newOverrides));
  },[allSchedules, vY, vM]);

  // 定期予定を展開してカレンダー用データを作成（overrides反映）
  const expandedSchedules=expandRecurring(allSchedules, vY, vM, overrides);
  const byDate={};
  expandedSchedules.forEach(s=>{if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  const selDateStr=selDay?toDS(vY,vM,selDay):null;
  const selScheds=selDateStr?(byDate[selDateStr]||[]).sort((a,b)=>a.startTime>b.startTime?1:-1):[];
  return(
    <div>
      <div style={S.card}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
          <button onClick={prev} style={{...S.btn("outline"),padding:"4px 11px"}}>‹</button>
          <span style={{fontSize:14,fontWeight:700}}>{vY}年 {MNAMES[vM]}</span>
          <button onClick={next} style={{...S.btn("outline"),padding:"4px 11px"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
          {DNAMES.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:i===0?COLORS.red:i===6?COLORS.blue:COLORS.muted,padding:"2px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {Array(first).fill(null).map((_,i)=><div key={`e${i}`}/>)}
          {Array(days).fill(null).map((_,i)=>{
            const day=i+1,ds=toDS(vY,vM,day),sch=byDate[ds]||[];
            const isT=ds===todayStr,isSel=selDay===day,dow=(first+i)%7;
            return(
              <div key={day} onClick={()=>setSelDay(isSel?null:day)} style={{minHeight:40,borderRadius:7,padding:"3px 2px",cursor:"pointer",background:isSel?COLORS.sageDark:isT?"#EBF4EE":"transparent",border:isT&&!isSel?`1px solid ${COLORS.sageDark}`:"1px solid transparent"}}>
                <div style={{fontSize:11,fontWeight:(isT||isSel)?700:400,color:isSel?"white":dow===0?COLORS.red:dow===6?COLORS.blue:COLORS.charcoal,textAlign:"center",marginBottom:2}}>{day}</div>
                {sch.slice(0,2).map((s,si)=><div key={si} style={{fontSize:8,background:isSel?"rgba(255,255,255,0.25)":COLORS.sageLight,color:"white",borderRadius:3,padding:"1px 3px",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.startTime} {s.clientName}</div>)}
                {sch.length>2&&<div style={{fontSize:8,color:isSel?"rgba(255,255,255,0.7)":COLORS.muted,textAlign:"center"}}>+{sch.length-2}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {selDateStr&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
            <div style={S.title}>📅 {vY}年{MNAMES[vM]}{selDay}日</div>
            <button style={{...S.btn("blue"),fontSize:11,padding:"4px 10px"}} onClick={()=>onDayClick(selDateStr)}>+ 予定追加</button>
          </div>
          {selScheds.length===0?<div style={{color:COLORS.muted,fontSize:12,textAlign:"center",padding:"9px 0"}}>予定はありません</div>:
            selScheds.map((s,idx)=>{
              const key=`${s.id}_${s.date}`;
              const currentStaff=assignStaff[key]||s.staff||"";
              return(
                <RecurringDayEditor
                  key={`${s.id}_${s.date}_${idx}`}
                  s={s}
                  idx={idx}
                  selDateStr={s.date}
                  currentStaff={currentStaff}
                  assignStaff={assignStaff}
                  setAssignStaff={setAssignStaff}
                  staffList={staffList}
                  onEditSchedule={onEditSchedule}
                  onDeleteSchedule={onDeleteSchedule}
                  existingOverride={overrides[`${s.id}_${s.date}`]}
                  onOverrideSaved={(key,data)=>setOverrides(prev=>({...prev,[key]:data}))}
                />
              );
            })
          }
        </div>
      )}
    </div>
  );
}

// timeSlot: "all"=終日, "am"=午前, "pm"=午後, "custom"=時間指定
const SLOT_OPTIONS=[
  {key:"all",  label:"終日",   short:"終日", color:COLORS.sageDark},
  {key:"am",   label:"午前 AM",short:"AM",   color:COLORS.blue},
  {key:"pm",   label:"午後 PM",short:"PM",   color:COLORS.purple},
  {key:"custom",label:"時間指定",short:"時間",color:COLORS.accent},
];

function shiftDisplayLabel(req){
  if(req.type==="off") return "希望休";
  if(req.timeSlot==="am") return "AM";
  if(req.timeSlot==="pm") return "PM";
  if(req.timeSlot==="custom") return `${req.startTime||""}〜${req.endTime||""}`;
  return "終日";
}

function ShiftRequestView({currentUser,staffList,setStaffList}){
  const me=staffList.find(s=>s.id===currentUser.id);

  const [vY,setVY]=useState(today.getFullYear()),[vM,setVM]=useState(today.getMonth()),[sel,setSel]=useState(null);

  const [customEnd,setCustomEnd]=useState("");
  const days=getDays(vY,vM),first=getFirst(vY,vM);
  const myReqs=me?.shiftRequests||[];
  const getReq=ds=>myReqs.find(r=>r.date===ds)||null;

  const saveReq=(ds,type,timeSlot,startTime,endTime)=>{
    const updated=[...myReqs.filter(r=>r.date!==ds),{date:ds,type,timeSlot,startTime,endTime}];
    setStaffList(prev=>prev.map(s=>s.id===currentUser.id?{...s,shiftRequests:updated}:s));
    saveDoc('staff', currentUser.id, { shiftRequests: updated });
  };
  const removeReq=ds=>{

    if(pendingSlot==="custom"&&(!customStart||!customEnd)){alert("開始・終了時刻を入力してください");return;}

      <div style={S.card}>

        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",fontSize:11}}>
          {SLOT_OPTIONS.map(s=><div key={s.key} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:10,height:10,borderRadius:2,background:s.color}}/>{s.label}</div>)}
          <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:10,height:10,borderRadius:2,background:COLORS.red}}/> 希望休</div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>

// ========== ADMIN: STAFF MANAGEMENT ==========
function StaffManagement({staffList,setStaffList,clients,allSchedules,onConfirmSchedule}){
  const [tab,setTab]=useState("shifts"); // shifts | list | assign
  const today=new Date();
  const [vY,setVY]=useState(today.getFullYear()),[vM,setVM]=useState(today.getMonth());
  const days=getDays(vY,vM),first=getFirst(vY,vM);
  const prev=()=>{if(vM===0){setVY(y=>y-1);setVM(11);}else setVM(m=>m-1);};
  const next=()=>{if(vM===11){setVY(y=>y+1);setVM(0);}else setVM(m=>m+1);};

  // 未確定スケジュール
  const unconfirmed=allSchedules.filter(s=>!s.confirmed);

  const getStaffForDate=ds=>staffList.map(s=>({...s,req:s.shiftRequests?.find(r=>r.date===ds)||null})).filter(s=>s.req);
  const reqBg=(req)=>{
    if(!req||req.type==="off") return COLORS.red;
    const slot=["all","am","pm","custom"];
    const colors=[COLORS.sageDark,COLORS.blue,COLORS.purple,COLORS.accent];
    return colors[slot.indexOf(req.timeSlot)]||COLORS.sageDark;

  return(
    <div style={S.main}>

          const isPending=k==="pending";
          const pendingCount=(staffList||[]).filter(s=>s.status==="pending").length;
          return(
            <button key={k} onClick={()=>setTab(k)} style={{...S.btn(tab===k?"primary":"outline"),fontSize:11,padding:"5px 12px",position:"relative"}}>

            </button>

        })}
      </div>

      {tab==="shifts"&&(
        <div style={S.card}>
          <div style={S.title}>📅 スタッフ希望一覧</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
            <button onClick={prev} style={{...S.btn("outline"),padding:"4px 11px"}}>‹</button>
            <span style={{fontSize:14,fontWeight:700}}>{vY}年 {MNAMES[vM]}</span>
            <button onClick={next} style={{...S.btn("outline"),padding:"4px 11px"}}>›</button>
          </div>
          <div style={{display:"flex",gap:7,marginBottom:9,fontSize:10,flexWrap:"wrap"}}>
            <span><span style={{...S.badge(COLORS.sageDark),marginRight:3}}>●</span>終日</span>
            <span><span style={{...S.badge(COLORS.blue),marginRight:3}}>●</span>AM</span>
            <span><span style={{...S.badge(COLORS.purple),marginRight:3}}>●</span>PM</span>
            <span><span style={{...S.badge(COLORS.accent),marginRight:3}}>●</span>時間指定</span>
            <span><span style={{...S.badge(COLORS.red),marginRight:3}}>●</span>希望休</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
            {DNAMES.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:i===0?COLORS.red:i===6?COLORS.blue:COLORS.muted}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {Array(first).fill(null).map((_,i)=><div key={`e${i}`}/>)}

              const day=i+1,ds=toDS(vY,vM,day),sfd=getStaffForDate(ds),dow=(first+i)%7;

                      <input type="radio" name={`role_${st.id}`} checked={st.role===r} onChange={()=>{

// ========== 家族アカウント管理 ==========
function FamilyAccountManager({clients, staffList, setStaffList}){
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:"",loginId:"",password:"",clientId:""});
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const familyAccounts=(staffList||[]).filter(s=>s.role==="family");

  const handleAdd=async()=>{
    if(!form.name||!form.loginId||!form.password||!form.clientId){alert("すべての項目を入力してください");return;}
    if(form.password.length<4){alert("パスワードは4文字以上にしてください");return;}
    const exists=(staffList||[]).find(s=>s.loginId===form.loginId);
    if(exists){alert("このIDはすでに登録されています。別のIDにしてください");return;}
    const newFam={
      id:"family_"+Date.now(),
      name:form.name,
      email:form.loginId+"@family.local", // ダミーメール
      loginId:form.loginId,
      password:form.password,
      role:"family", status:"active", phone:"",
      clientId:parseInt(form.clientId),
      assignedClientIds:[], shiftRequests:[], confirmedShifts:[]
    };
    try{
      await db.collection("staff").doc(newFam.id).set(newFam);
      setStaffList(prev=>[...prev,newFam]);
      setForm({name:"",email:"",password:"",clientId:""});
      setShowAdd(false);
      alert(`${form.name}さんのアカウントを作成しました\nID: ${form.loginId}\nパスワード: ${form.password}\n\nご家族にお伝えください`);
    }catch(e){ alert("作成に失敗しました"); console.error(e); }
  };

  const handleDelete=async(id,name)=>{
    if(!window.confirm(`${name}さんのアカウントを削除しますか？`)) return;

      await db.collection("staff").doc(id).delete();
      setStaffList(prev=>prev.filter(s=>s.id!==id));

    <div>
      <div style={S.card}>

        </div>

        {showAdd&&(
          <div style={{background:COLORS.blueLight,borderRadius:8,padding:12,marginBottom:14,border:`1px solid ${COLORS.blue}`}}>
            <div style={{fontSize:12,fontWeight:600,color:COLORS.blue,marginBottom:10}}>新規家族アカウント</div>
            <div style={S.row}>
              <div style={S.col}><label style={S.label}>氏名 *</label><input style={S.input} placeholder="山田 太郎" value={form.name} onChange={e=>setF("name",e.target.value)}/></div>
            </div>
                    <div style={{marginBottom:8}}>
              <label style={S.label}>ログインID *（英数字で設定してください）</label>
              <input style={S.input} type="text" placeholder="例）yamada001" value={form.loginId||""} onChange={e=>setF("loginId",e.target.value)}/>
              <div style={{fontSize:10,color:COLORS.muted,marginTop:3}}>※ご家族がログインに使うIDです</div>
            </div>
            <div style={{marginBottom:8}}><label style={S.label}>パスワード（4文字以上）*</label><input style={S.input} type="password" placeholder="パスワード" value={form.password} onChange={e=>setF("password",e.target.value)}/></div>
            <div style={{marginBottom:12}}>
              <label style={S.label}>担当利用者 *</label>
              <select style={S.input} value={form.clientId} onChange={e=>setF("clientId",e.target.value)}>
                <option value="">選択してください</option>

              </select>
            </div>
            <button style={{...S.btn("primary"),fontSize:12,padding:"7px 18px"}} onClick={handleAdd}>アカウントを作成</button>
          </div>
        )}

        {familyAccounts.length===0?(
          <div style={{color:COLORS.muted,fontSize:13,textAlign:"center",padding:"14px 0"}}>家族アカウントはまだありません</div>
        ):familyAccounts.map(f=>{
          const linkedClient=clients.find(c=>c.id===f.clientId);
          return(
            <div key={f.id} style={S.listItem}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{f.name}</div>
                  <div style={{fontSize:11,color:COLORS.muted,marginBottom:2}}>ID: {f.loginId||f.email}</div>
                  <div style={{fontSize:11,color:COLORS.sageDark}}>担当利用者: {linkedClient?.name||"未設定"}</div>

                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

// ========== UPCOMING WIDGET ==========
function UpcomingWidget({allSchedules, overrides={}}){
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);
  const year=today.getFullYear(), month=today.getMonth();

  // 今月・来月の定期予定を展開してoverrideを反映
  const expanded=[
    ...expandRecurring(allSchedules, year, month, overrides),
    ...expandRecurring(allSchedules, month===11?year+1:year, month===11?0:month+1, overrides),
  ];

  // 通常予定も含めて合体（重複除去）
  const normalSchedules=allSchedules.filter(s=>!s.recurring&&s.date>=todayStr);
  const allExpanded=[...expanded.filter(s=>s.date>=todayStr), ...normalSchedules];

  // 重複除去してソート
  const seen=new Set();
  const upcoming=allExpanded
    .filter(s=>{
      const key=`${s.id}_${s.date}`;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:a.startTime>b.startTime?1:-1)
    .slice(0,5);

  const [selectedSchedule,setSelectedSchedule]=useState(null);

  if(upcoming.length===0) return null;
  return(
    <div style={S.card}>
      <div style={S.title}>📅 直近の予定</div>
      {upcoming.map((s,i)=>(
        <div key={`${s.id}_${s.date}_${i}`}
          onClick={()=>setSelectedSchedule(selectedSchedule?.id===s.id&&selectedSchedule?.date===s.date?null:s)}
          style={{...S.listItem,display:"flex",gap:8,alignItems:"flex-start",cursor:"pointer",
            background:selectedSchedule?.id===s.id&&selectedSchedule?.date===s.date?"#EBF4EE":"transparent",
            borderRadius:8,padding:"8px 6px",transition:"background 0.15s"}}>
          <div style={{minWidth:58,background:s.isRecurringInstance?COLORS.greenLight:COLORS.blueLight,borderRadius:7,padding:"4px 3px",textAlign:"center",border:`1px solid ${s.isRecurringInstance?COLORS.green:COLORS.blue}`,flexShrink:0}}>
            <div style={{fontSize:10,color:s.isRecurringInstance?COLORS.green:COLORS.blue}}>{s.date.slice(5).replace("-","/")}</div>
            <div style={{fontSize:11,fontWeight:700,color:s.isRecurringInstance?COLORS.green:COLORS.blue}}>{s.startTime}</div>
            {s.endTime&&<div style={{fontSize:9,color:COLORS.muted}}>〜{s.endTime}</div>}
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              <span style={{fontSize:13,fontWeight:700}}>{s.clientName}</span>
              {s.isRecurringInstance
                ?<span style={S.badge(s.confirmed?COLORS.green:COLORS.blue)}>{s.confirmed?"✓確定":"🔁定期"}</span>
                :<span style={S.badge(s.confirmed?COLORS.green:COLORS.gold)}>{s.confirmed?"確定":"未確定"}</span>}
            </div>
            <div style={{fontSize:11,color:COLORS.sageDark}}>{serviceLabel(s.services)}</div>
            {s.staff&&<div style={{fontSize:10,color:COLORS.muted}}>担当: {s.staff}</div>}
            {/* タップで詳細展開 */}
            {selectedSchedule?.id===s.id&&selectedSchedule?.date===s.date&&(
              <div style={{marginTop:8,padding:"8px 10px",background:"white",borderRadius:8,border:`1px solid ${COLORS.border}`}}>
                <div style={{fontSize:11,color:COLORS.muted,marginBottom:4}}>📋 詳細</div>
                <div style={{fontSize:12,marginBottom:3}}>
                  <span style={{color:COLORS.muted}}>日時：</span>
                  {s.date}　{s.startTime}{s.endTime?` 〜 ${s.endTime}`:""}
                </div>
                <div style={{fontSize:12,marginBottom:3}}>
                  <span style={{color:COLORS.muted}}>利用者：</span>{s.clientName}
                </div>
                {s.staff&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:COLORS.muted}}>担当：</span>{s.staff}</div>}
                {s.services?.length>0&&(
                  <div style={{fontSize:12,marginBottom:3}}>
                    <span style={{color:COLORS.muted}}>内容：</span>
                    <span style={{color:COLORS.sageDark,fontWeight:600}}>{serviceLabel(s.services)}</span>
                  </div>
                )}
                {s.note&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:COLORS.muted}}>メモ：</span>{s.note}</div>}
                {s.isRecurringInstance&&<div style={{fontSize:10,color:COLORS.blue,marginTop:4}}>🔁 定期予定</div>}
              </div>
            )}
          </div>
          <div style={{fontSize:11,color:COLORS.muted,alignSelf:"center"}}>{selectedSchedule?.id===s.id&&selectedSchedule?.date===s.date?"▲":"▼"}</div>
        </div>
      ))}
    </div>
  );
}

// ========== CLIENT CARD ==========
function ClientCard({client,onClick,isPC}){
  return(
    <div style={{...S.card,cursor:"pointer"}} onClick={onClick}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:isPC?16:14,fontWeight:700,marginBottom:3}}>{client.name}</div>
          <div style={{fontSize:isPC?13:11,color:COLORS.muted}}>{client.age}歳　{client.address}</div>
          <div style={{fontSize:isPC?12:11,color:COLORS.brown,marginTop:2}}>{client.diagnosis}</div>
          {client.paymentMethod&&<div style={{fontSize:isPC?12:10,color:COLORS.sageDark,marginTop:3}}>{paymentLabel(client.paymentMethod)}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
          <div style={S.tag(COLORS.sageLight)}>記録 {client.records.length}件</div>
          {client.schedules?.length>0&&<div style={S.tag(COLORS.blue)}>予定 {client.schedules.length}件</div>}
        </div>
      </div>
    </div>
  );
}

// ========== MAIN APP ==========
function App(){
  const [currentUser,setCurrentUser]=useState(()=>{
    try{
      const saved=localStorage.getItem("kurashi_care_user");
      return saved?JSON.parse(saved):null;
    }catch(e){ return null; }
  });
  const [isPC,setIsPC]=useState(window.innerWidth>=900);
  useEffect(()=>{
    const handler=()=>setIsPC(window.innerWidth>=900);
    window.addEventListener("resize",handler);
    return()=>window.removeEventListener("resize",handler);
  },[]);
  const [clients,setClients]=useState([]);
  const { data: fbClients, loading: clientsLoading } = useFirestore('clients');
  useEffect(()=>{
    if(!clientsLoading){
      setClients(fbClients);
    }
  },[fbClients,clientsLoading]);
  const [staffList,setStaffList]=useState([]);
  const { data: fbStaff, loading: staffLoading } = useFirestore('staff');
  useEffect(()=>{
    if(!staffLoading){
      setStaffList(fbStaff);
    }
  },[fbStaff,staffLoading]);
  const [allSchedules,setAllSchedules]=useState([]);
  const [calendarOverrides,setCalendarOverrides]=useState({});

  // 全スケジュールのoverrideをFirebaseから読み込む
  useEffect(()=>{
    if(allSchedules.length===0) return;
    allSchedules.filter(s=>s.recurring).forEach(s=>{
      db.collection("schedules").doc(String(s.id)).collection("overrides").get()
        .then(snap=>{ snap.forEach(doc=>{ setCalendarOverrides(prev=>({...prev,[`${s.id}_${doc.id}`]:doc.data()})); }); })
        .catch(()=>{});
    });
  },[allSchedules.length]);
  const { data: fbSchedules, loading: schedulesLoading } = useFirestore('schedules');
  useEffect(()=>{ if(!schedulesLoading && fbSchedules.length>0) setAllSchedules(fbSchedules); },[fbSchedules,schedulesLoading]);
  const [selectedId,setSelectedId]=useState(null);
  const [clientTab,setClientTab]=useState("record");
  const [topTab,setTopTab]=useState("clients");
  const [showAddClient,setShowAddClient]=useState(false);
  const [showSchedModal,setShowSchedModal]=useState(false);
  const [schedDefaultDate,setSchedDefaultDate]=useState(null);
  const [newClient,setNewClient]=useState({name:"",kana:"",age:"",address:"",diagnosis:"",emergency:"",life:"",notes:"",paymentMethod:"",distanceKm:"",showFeeToFamily:false});
  const [clientSearch,setClientSearch]=useState("");
  const [kanaFilter,setKanaFilter]=useState(null);
  const [editingSchedule,setEditingSchedule]=useState(null);

  if(!currentUser) return <LoginScreen onLogin={setCurrentUser} staffList={staffList}/>;
  if(currentUser.role==="family") return(
    <div style={S.app}>
      <div style={S.header}>
        <span style={S.headerTitle}>🌱 暮らしのケア記録</span>
        <button onClick={()=>{ auth.signOut().catch(()=>{}); localStorage.removeItem("kurashi_care_user"); setCurrentUser(null); }} style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",cursor:"pointer",fontSize:11}}>ログアウト</button>
      </div>
      <FamilyPortal currentUser={currentUser} clients={clients}/>
    </div>
  );

  const selected=clients.find(c=>c.id===selectedId);

  // スタッフの場合は担当利用者のみ
  const baseClients = canSeeAllClients(currentUser.role)
    ? clients
    : clients.filter(c=>{
        const me=staffList.find(s=>s.id===currentUser.id);
        return (me?.assignedClientIds||[]).includes(c.id);
      });

  // かな行マップ
  const KANA_ROWS={"あ":["あ","い","う","え","お"],"か":["か","き","く","け","こ"],"さ":["さ","し","す","せ","そ"],"た":["た","ち","つ","て","と"],"な":["な","に","ぬ","ね","の"],"は":["は","ひ","ふ","へ","ほ"],"ま":["ま","み","む","め","も"],"や":["や","ゆ","よ"],"ら":["ら","り","る","れ","ろ"],"わ":["わ","を","ん"]};

  // 検索・かなフィルター
  const filteredClients = baseClients.filter(c=>{
    if(clientSearch){
      const q=clientSearch;
      return (c.name||"").includes(q)||(c.kana||"").includes(q);
    }
    if(kanaFilter){
      const first=(c.kana||c.name||"")[0]||"";
      return (KANA_ROWS[kanaFilter]||[kanaFilter]).some(k=>first===k);
    }
    return true;
  });

  // あいうえお順でソート
  const visibleClients = [...filteredClients].sort((a,b)=>
    (a.kana||a.name||"").localeCompare(b.kana||b.name||"","ja")
  );

  const handleEditSchedule=(schedule)=>{
    setEditingSchedule(schedule);
    setSchedDefaultDate(schedule.date==="定期"?"recurring":schedule.date);
    setShowSchedModal(true);
  };

  const handleDeleteSchedule=async(scheduleId)=>{
    if(!window.confirm("この予定を削除しますか？")) return;
    setAllSchedules(prev=>prev.filter(s=>s.id!==scheduleId));
    try{ await db.collection("schedules").doc(String(scheduleId)).delete(); }catch(e){ console.error(e); }
  };

  const handleSaveRecord=async record=>{
    const updated = clients.map(c=>c.id===selectedId?{...c,records:[...(c.records||[]),record]}:c);
    setClients(updated);
    const client = updated.find(c=>c.id===selectedId);
    if(client) await saveDoc('clients', selectedId, { records: client.records });
  };
  const handleUpdateClient=async updated=>{
    setClients(prev=>prev.map(c=>c.id===updated.id?updated:c));
    await saveDoc('clients', updated.id, updated);
  };

  const handleSaveSchedule=async schedule=>{
    setAllSchedules(prev=>[...prev,schedule]);
    const updated = clients.map(c=>c.id===schedule.clientId?{...c,schedules:[...(c.schedules||[]),schedule]}:c);
    setClients(updated);
    const client = updated.find(c=>c.id===schedule.clientId);
    if(client) await saveDoc('clients', schedule.clientId, { schedules: client.schedules });
    await addDoc('schedules', schedule);
    setShowSchedModal(false);
  };

  const handleConfirmSchedule=async(scheduleId, staffName)=>{
    setAllSchedules(prev=>prev.map(s=>s.id===scheduleId?{...s,confirmed:true}:s));
    const sched=allSchedules.find(s=>s.id===scheduleId);
    if(sched&&staffName){
      const staffMember=staffList.find(s=>s.name===staffName);
      if(staffMember){
        const updatedShifts=[...(staffMember.confirmedShifts||[]),{...sched,confirmed:true}];
        setStaffList(prev=>prev.map(s=>s.id===staffMember.id?{...s,confirmedShifts:updatedShifts}:s));
        await saveDoc('staff', staffMember.id, { confirmedShifts: updatedShifts });
      }
    }
  };

  const handleAddClient=async()=>{
    if(!newClient.name){alert("氏名は必須です");return;}
    const newId=Date.now();
    const client={...newClient,id:newId,age:Number(newClient.age),records:[],schedules:[]};
    setClients(prev=>[...prev,client]);
    await saveDoc('clients', newId, client);
    setNewClient({name:"",age:"",address:"",diagnosis:"",emergency:"",life:"",notes:"",paymentMethod:""});
    setShowAddClient(false);
  };

  const setNC=(k,v)=>setNewClient(f=>({...f,[k]:v}));
  const roleLabel={admin:"管理者",sv:"SV",cl:"CL",cp:"CP",staff:"スタッフ"};
  const roleBadgeColor={admin:COLORS.purple,sv:"#1A6B8A",cl:COLORS.sageDark,cp:COLORS.sage,staff:COLORS.sageDark};

  // CLIENT DETAIL VIEW
  if(selected){
    return(
      <div style={S.app}>
        <div style={S.header}>
          <button onClick={()=>{setSelectedId(null);setClientTab("record");}} style={{background:"none",border:"none",color:"white",cursor:"pointer",fontSize:19}}>←</button>
          <span style={S.headerTitle}>{selected.name} さん</span>
          <span style={{fontSize:10,color:COLORS.sageLight}}>{selected.age}歳</span>
        </div>
        <div style={S.nav}>
          {[["record","📝 記録"],["schedule","📅 予定"],["list","📋 一覧"],["assessment","🌿 アセスメント"],["family","👨‍👩‍👧 家族"]].map(([key,label])=>(
            <button key={key} style={S.navBtn(clientTab===key)} onClick={()=>setClientTab(key)}>{label}</button>
          ))}
        </div>
        <div style={{...S.main, ...(isPC&&clientTab==="assessment"?{maxWidth:1100}:{})}}>
          {isPC&&clientTab!=="assessment"?(
            <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:16,alignItems:"start"}}>
              <div>
                <div style={{...S.card,background:COLORS.sageDark,border:"none",marginBottom:12}}>
                  <div style={{color:"white",fontSize:15,fontWeight:700,marginBottom:4}}>{selected.name} さん</div>
                  <div style={{color:COLORS.sageLight,fontSize:12,marginBottom:8}}>{selected.age}歳　{selected.diagnosis}</div>
                  <div style={{color:"rgba(255,255,255,0.8)",fontSize:11}}>{selected.address}</div>
                  {selected.paymentMethod&&<div style={{marginTop:6,fontSize:11,color:COLORS.sageLight}}>{paymentLabel(selected.paymentMethod)}</div>}
                </div>
                <div style={{...S.card,padding:10}}>
                  {[["record","📝 記録入力"],["timer","⏱ タイマー"],["schedule","📅 予定"],["list","📋 記録一覧"],["assessment","🌿 アセスメント"],["family","👨‍👩‍👧 家族共有"]].map(([key,label])=>(
                    <button key={key} onClick={()=>setClientTab(key)} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 12px",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:clientTab===key?700:400,background:clientTab===key?"#EBF4EE":"transparent",color:clientTab===key?COLORS.sageDark:COLORS.charcoal,marginBottom:2}}>{label}</button>
                  ))}
                </div>
              </div>
              <div>
                {clientTab==="record"&&<RecordForm client={selected} currentUser={currentUser} staffList={staffList} onSave={handleSaveRecord}/>}
                
                {clientTab==="schedule"&&<ClientScheduleView client={selected} allSchedules={allSchedules} currentUser={currentUser} onAddSchedule={d=>{setEditingSchedule(null);setSchedDefaultDate(d);setShowSchedModal(true);}} onConfirmSchedule={(id)=>handleConfirmSchedule(id, allSchedules.find(s=>s.id===id)?.staff)} onEditSchedule={handleEditSchedule} onDeleteSchedule={handleDeleteSchedule}/>}
                {clientTab==="list"&&<RecordList records={selected.records} currentUser={currentUser} client={selected} staffList={staffList}
                  onUpdateRecord={async updated=>{ const nr=selected.records.map(r=>r.id===updated.id?updated:r); setClients(prev=>prev.map(c=>c.id===selected.id?{...c,records:nr}:c)); await saveDoc("clients",selected.id,{records:nr}); }}
                  onDeleteRecord={async id=>{ if(!window.confirm("この記録を削除しますか？")) return; const nr=selected.records.filter(r=>r.id!==id); setClients(prev=>prev.map(c=>c.id===selected.id?{...c,records:nr}:c)); await saveDoc("clients",selected.id,{records:nr}); }}
                />}
                {clientTab==="family"&&<FamilyPortal currentUser={{role:"family",clientId:selected.id}} clients={clients} viewingClient={selected}/>}
              </div>
            </div>
          ):(
            <>
              {clientTab==="record"&&<RecordForm client={selected} currentUser={currentUser} staffList={staffList} onSave={handleSaveRecord}/>}
              
              {clientTab==="schedule"&&<ClientScheduleView client={selected} allSchedules={allSchedules} currentUser={currentUser} onAddSchedule={d=>{setEditingSchedule(null);setSchedDefaultDate(d);setShowSchedModal(true);}} onConfirmSchedule={(id)=>handleConfirmSchedule(id, allSchedules.find(s=>s.id===id)?.staff)} onEditSchedule={handleEditSchedule} onDeleteSchedule={handleDeleteSchedule}/>}
              {clientTab==="list"&&<RecordList records={selected.records} currentUser={currentUser} client={selected} staffList={staffList}
                onUpdateRecord={async updated=>{ const nr=selected.records.map(r=>r.id===updated.id?updated:r); setClients(prev=>prev.map(c=>c.id===selected.id?{...c,records:nr}:c)); await saveDoc("clients",selected.id,{records:nr}); }}
                onDeleteRecord={async id=>{ if(!window.confirm("この記録を削除しますか？")) return; const nr=selected.records.filter(r=>r.id!==id); setClients(prev=>prev.map(c=>c.id===selected.id?{...c,records:nr}:c)); await saveDoc("clients",selected.id,{records:nr}); }}
              />}
              {clientTab==="assessment"&&<AssessmentView client={selected} onUpdate={handleUpdateClient} isPC={isPC} currentUser={currentUser}/>}
              {clientTab==="family"&&<FamilyPortal currentUser={{role:"family",clientId:selected.id}} clients={clients} viewingClient={selected}/>}
            </>
          )}
          {isPC&&clientTab==="assessment"&&<AssessmentView client={selected} onUpdate={handleUpdateClient} isPC={isPC} currentUser={currentUser}/>}
        </div>
        {showSchedModal&&<ScheduleModal clients={visibleClients} defaultDate={schedDefaultDate} currentUser={currentUser} staffList={staffList} editingSchedule={editingSchedule} onSave={handleSaveSchedule} onClose={()=>{setShowSchedModal(false);setEditingSchedule(null);}}/>}
      </div>
    );
  }

  // TOP LEVEL TABS
  const topTabs=currentUser.role==="admin"
    ?[["clients","👤 利用者"],["calendar","📅 カレンダー"],["staff","👥 スタッフ管理"],["myshift","📋 シフト希望"]]
    :currentUser.role==="sv"
    ?[["clients","👤 利用者"],["calendar","📅 カレンダー"],["staff","👥 スタッフ管理"],["myshift","📋 シフト希望"]]
    :[["clients","👤 利用者"],["calendar","📅 カレンダー"],["myshift","📋 シフト希望"]];

  return(
    <div style={S.app}>
      <div style={S.header}>
        <span style={S.headerTitle}>🌱 暮らしのケア記録</span>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.85)"}}>
            <span style={{...S.badge(roleBadgeColor[currentUser.role]),marginRight:4}}>{roleLabel[currentUser.role]}</span>
            {currentUser.name}
          </span>
          <button onClick={()=>{ auth.signOut().catch(()=>{}); localStorage.removeItem("kurashi_care_user"); setCurrentUser(null); }} style={{background:"none",border:"1px solid rgba(255,255,255,0.3)",color:"rgba(255,255,255,0.8)",cursor:"pointer",fontSize:10,borderRadius:6,padding:"2px 7px"}}>ログアウト</button>
        </div>
      </div>
      <div style={S.nav}>
        {topTabs.map(([k,l])=><button key={k} style={S.navBtn(topTab===k)} onClick={()=>setTopTab(k)}>{l}</button>)}
      </div>

      {topTab==="clients"&&(
        <div style={S.main}>
          <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginBottom:9}}>
            {currentUser.role==="admin"&&<button style={{...S.btn("outline"),fontSize:11,padding:"5px 11px"}} onClick={()=>setShowAddClient(!showAddClient)}>{showAddClient?"閉じる":"+ 利用者追加"}</button>}
            <button style={{...S.btn("blue"),fontSize:11,padding:"5px 11px"}} onClick={()=>{setSchedDefaultDate(null);setShowSchedModal(true);}}>+ 予定追加</button>
          </div>
          {showAddClient&&currentUser.role==="admin"&&(
            <div style={S.card}>
              <div style={S.title}>👤 新しい利用者を登録</div>
              <div style={S.row}>
                <div style={S.col}>
                <label style={S.label}>氏名 *</label>
                <input style={S.input} placeholder="山田 花子" value={newClient.name} onChange={e=>setNC("name",e.target.value)}/>
                <input style={{...S.input,marginTop:4,fontSize:11}} placeholder="ふりがな（やまだ はなこ）" value={newClient.kana||""} onChange={e=>setNC("kana",e.target.value)}/>
              </div>
                <div style={{width:66}}><label style={S.label}>年齢</label><input style={S.input} placeholder="82" value={newClient.age} onChange={e=>setNC("age",e.target.value)}/></div>
            </div>
            <div style={{marginBottom:8}}>
              <label style={S.label}>生年月日（入力で年齢自動計算）</label>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input style={{...S.input,flex:1}} type="date" value={newClient.birthday||""} onChange={e=>{
                  const bday=e.target.value;
                  setNC("birthday",bday);
                  if(bday){
                    const today=new Date(), birth=new Date(bday);
                    let age=today.getFullYear()-birth.getFullYear();
                    const m=today.getMonth()-birth.getMonth();
                    if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
                    setNC("age",age);
                  }
                }}/>
                {newClient.birthday&&<span style={{fontSize:12,color:COLORS.sageDark,fontWeight:600,whiteSpace:"nowrap"}}>{newClient.age}歳</span>}
              </div>
            </div>
  
              <div style={{marginBottom:8}}><label style={S.label}>住所</label><input style={S.input} value={newClient.address} onChange={e=>setNC("address",e.target.value)}/></div>
              <div style={{marginBottom:8}}><label style={S.label}>既往歴・診断名</label><input style={S.input} value={newClient.diagnosis} onChange={e=>setNC("diagnosis",e.target.value)}/></div>
              <div style={{marginBottom:8}}><label style={S.label}>緊急連絡先</label><input style={S.input} placeholder="山田 太郎（長男）090-〇〇〇〇" value={newClient.emergency} onChange={e=>setNC("emergency",e.target.value)}/></div>
              <div style={{marginBottom:8}}>
                <label style={S.label}>💳 支払い方法</label>
                <PaymentSelector value={newClient.paymentMethod} onChange={v=>setNC("paymentMethod",v)} name="nc_pay"/>
              </div>
              <div style={{marginBottom:8}}>
                <label style={S.label}>🚗 送迎遠距離加算（片道km）</label>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input style={{...S.input,width:100}} type="number" placeholder="例）18" value={newClient.distanceKm} onChange={e=>setNC("distanceKm",e.target.value)}/>
                  <span style={{fontSize:11,color:COLORS.muted}}>km　（15km未満は加算なし）</span>
                </div>
                {newClient.distanceKm&&parseFloat(newClient.distanceKm)>=15&&(
                  <div style={{fontSize:11,color:COLORS.accent,marginTop:4}}>
                    {parseFloat(newClient.distanceKm)<20?"遠距離加算：+1,000円":`遠距離加算：+${Math.ceil((parseFloat(newClient.distanceKm)-15)/10)*1000}円`}が自動加算されます
                  </div>
                )}
              </div>
              <div style={{marginBottom:8}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12}}>
                  <input type="checkbox" checked={newClient.showFeeToFamily||false} onChange={e=>setNC("showFeeToFamily",e.target.checked)} style={{width:15,height:15,accentColor:COLORS.sageDark}}/>
                  <span>💴 ご家族に料金を公開する</span>
                </label>
              </div>
              <div style={{marginBottom:8}}><label style={S.label}>🌿 生きてきた過程・人となり</label><textarea style={S.textarea} placeholder="生まれや育ち、仕事、趣味、大切にしてきたこと、性格など..." value={newClient.life} onChange={e=>setNC("life",e.target.value)}/></div>
              <div style={{marginBottom:12}}><label style={S.label}>関わる際のポイント・注意点</label><textarea style={{...S.textarea,minHeight:52}} placeholder="接し方のコツ、好きなこと、避けたほうがよいことなど..." value={newClient.notes} onChange={e=>setNC("notes",e.target.value)}/></div>
              <button style={S.btn("primary")} onClick={handleAddClient}>登録する</button>
            </div>
          )}
          <UpcomingWidget allSchedules={allSchedules} overrides={calendarOverrides}/>
          {/* 検索バー */}
          <div style={{marginBottom:8,position:"relative"}}>
            <input style={{...S.input,paddingLeft:32,fontSize:13}} placeholder="利用者を検索（名前・ふりがな）" value={clientSearch} onChange={e=>setClientSearch(e.target.value)}/>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:COLORS.muted}}>🔍</span>
            {clientSearch&&<button onClick={()=>setClientSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:COLORS.muted}}>×</button>}
          </div>
          {/* あいうえお行フィルター */}
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:10}}>
            {["全","あ","か","さ","た","な","は","ま","や","ら","わ"].map(k=>{
              const active=(k==="全"&&!kanaFilter)||(kanaFilter===k);
              return(
                <button key={k} onClick={()=>setKanaFilter(k==="全"?null:kanaFilter===k?null:k)}
                  style={{padding:"4px 9px",borderRadius:16,border:`1px solid ${active?COLORS.sageDark:COLORS.border}`,background:active?COLORS.sageDark:"white",color:active?"white":COLORS.charcoal,cursor:"pointer",fontSize:12,fontWeight:700}}>
                  {k}
                </button>
              );
            })}
          </div>
          {filteredClients.length===0?(
            <div style={{...S.card,color:COLORS.muted,textAlign:"center",padding:24,fontSize:13}}>
              {clientSearch||kanaFilter?"該当する利用者が見つかりません":currentUser.role==="staff"?"担当利用者が設定されていません。管理者にご連絡ください。":"利用者が登録されていません"}
            </div>
          ):(
            <>
              <div style={{fontSize:11,color:COLORS.muted,marginBottom:8}}>
                {filteredClients.length}名 {currentUser.role==="staff"?"（担当）":""} — タップして記録を開始
              </div>
              <div style={isPC?{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}:{}}>
                {filteredClients.map(c=><ClientCard key={c.id} client={c} onClick={()=>setSelectedId(c.id)} isPC={isPC}/>)}
              </div>
            </>
          )}
        </div>
      )}

      {topTab==="calendar"&&(
        <div style={S.main}>
          <CalendarView allSchedules={allSchedules} staffList={staffList} currentUser={currentUser} onDayClick={d=>{setEditingSchedule(null);setSchedDefaultDate(d);setShowSchedModal(true);}} onEditSchedule={handleEditSchedule} onDeleteSchedule={handleDeleteSchedule}/>
        </div>
      )}

      {topTab==="staff"&&currentUser.role==="admin"&&(
        <StaffManagement staffList={staffList} setStaffList={setStaffList} clients={clients} allSchedules={allSchedules} onConfirmSchedule={handleConfirmSchedule}/>
      )}

      {topTab==="myshift"&&(
        <ShiftRequestView currentUser={currentUser} staffList={staffList} setStaffList={setStaffList}/>
      )}

      {showSchedModal&&<ScheduleModal clients={visibleClients} defaultDate={schedDefaultDate} currentUser={currentUser} staffList={staffList} onSave={handleSaveSchedule} onClose={()=>setShowSchedModal(false)}/>}
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
